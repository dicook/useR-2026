function createDashSVG(color, angle) {
  const rgb = COLORS[color];
  const id = 'g' + Math.random().toString(36).substr(2, 9);
  return `<svg viewBox="0 0 500 120" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="${id}" x1="0%" y1="50%" x2="100%" y2="50%">

        <stop offset="50%" stop-color="rgba(${rgb}, 0.3)"/>
        <stop offset="100%" stop-color="rgba(${rgb}, 0.65)"/>
      </linearGradient>
    </defs>
    <rect x="0" y="0" width="500" height="120" rx="8" fill="url(#${id})" transform="rotate(${angle} 250 60)"/>
  </svg>`;
}

function createShapeSVG(color, shapeName, angle = 0) {
  const path = SHAPES[shapeName];
  const viewBox = shapeName === 'heart' ? '0 0 80 75' : '0 0 80 80';
  // Use the global gradient defined in the SVG defs
  return `<svg viewBox="${viewBox}" xmlns="http://www.w3.org/2000/svg" style="transform: rotate(${angle}deg); overflow: visible;">
    <path d="${path}" fill="none" stroke="url(#grad-${color})" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function createDecoration(type, color, options = {}) {
  const div = document.createElement('div');
  div.className = 'paper-decoration';

  const styles = [
    'position: absolute',
    'pointer-events: none',
  ];

  if (options.top !== undefined) styles.push(`top: ${options.top}`);
  if (options.bottom !== undefined) styles.push(`bottom: ${options.bottom}`);
  if (options.left !== undefined) styles.push(`left: ${options.left}`);
  if (options.right !== undefined) styles.push(`right: ${options.right}`);
  styles.push(`width: ${options.width || '15%'}`);

  if (type === 'dash') {
    styles.push('aspect-ratio: 500 / 120');
    div.innerHTML = createDashSVG(color, options.angle || 0);
  } else if (SHAPES[type]) {
    styles.push(type === 'heart' ? 'aspect-ratio: 80 / 75' : 'aspect-ratio: 1');
    div.innerHTML = createShapeSVG(color, type, options.angle || 0);
  }

  div.style.cssText = styles.join('; ');

  const svg = div.querySelector('svg');
  if (svg) {
    svg.style.width = '100%';
    svg.style.height = '100%';
    svg.style.overflow = 'visible';
  }

  return div;
}

let decorationContainers = [];

function initPaperDecorations() {
  console.log('Initializing paper decorations...');

  // Get all slides and backgrounds in order
  const allSlides = document.querySelectorAll('.reveal .slides section');
  const allBackgrounds = document.querySelectorAll('.reveal .backgrounds .slide-background');

  allSlides.forEach((slide, index) => {
    // Skip if already decorated
    if (slide.dataset.decorated) return;

    // Check which theme class this slide has
    let themeClass = null;
    Object.keys(PAPER_THEMES).forEach(tc => {
      if (slide.classList.contains(tc)) {
        themeClass = tc;
      }
    });

    if (!themeClass) return;

    slide.dataset.decorated = 'true';

    // Get the corresponding background by index
    const bg = allBackgrounds[index];
    if (!bg) return;

    console.log(`Decorating slide ${index} with ${themeClass}`);

    // Create container
    const container = document.createElement('div');
    container.className = 'paper-decorations-container';
    container.style.cssText = `
      position: absolute;
      pointer-events: none;
      overflow: visible;
    `;

    // Add decorations
    PAPER_THEMES[themeClass].forEach(config => {
      const decoration = createDecoration(config.type, config.color, config);
      container.appendChild(decoration);
    });

    bg.appendChild(container);
    bg.style.overflow = 'visible';

    // Store reference for repositioning
    decorationContainers.push({ container, slide, bg });
  });

  // Initial position update
  updateDecorationPositions();
}

function updateDecorationPositions() {
  decorationContainers.forEach(({ container, slide, bg }) => {
    // Get the slide's actual rendered position (after reveal.js scaling)
    const slideRect = slide.getBoundingClientRect();
    const bgRect = bg.getBoundingClientRect();

    // Calculate position relative to background
    const top = slideRect.top - bgRect.top;
    const left = slideRect.left - bgRect.left;
    const width = slideRect.width;
    const height = slideRect.height;

    container.style.top = `${top}px`;
    container.style.left = `${left}px`;
    container.style.width = `${width}px`;
    container.style.height = `${height}px`;
  });
}

// Wait for Reveal to be fully ready
window.addEventListener('load', function() {
  setTimeout(function() {
    if (typeof Reveal !== 'undefined') {
      initPaperDecorations();

      // Update positions on resize
      window.addEventListener('resize', updateDecorationPositions);

      // Update on slide change
      Reveal.on('slidechanged', () => {
        setTimeout(updateDecorationPositions, 50);
      });

      // Update on reveal resize
      Reveal.on('resize', updateDecorationPositions);
    }
  }, 500);
});
